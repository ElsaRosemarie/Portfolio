},{\"src\":\"/images/RESEARCH/Hum(us)/Collage 3 resized.jpg\",\"alt\":\"Collage 3\"},{\"src\":\"/images/RESEARCH/Hum(us)/Cultural probe booklet.png\",\"alt\":\"Cultural probe booklet\"},{\"src\":\"/images/RESEARCH/Hum(us)/IMG-20240404-WA0005-2.jpg\",\"alt\":\"IMG-20240404-WA0005-2\"},{\"src\":\"/images/RESEARCH/Hum(us)/IMG-20240607-WA0028-3.jpg\",\"alt\":\"IMG-20240607-WA0028-3\"}],\"standalone\":false,\"paragraphs\":[\"*Thesis | MSc Anthropology and Development Studies | Jan. 2024 – July 2024*\",\"For my master's thesis, I travelled to Ireland and researched how residents of the Cloughjordan Ecovillage aim to create close relationships with other-than-human actors (e.g. plants, trees, soil) as an alternative to the idea that humans and nature stand apart from one another. Applying a combination of ethnography and arts-based methods, I found that although the ecovillage aims for a close-knit community dedicated to sustainable living, there is a lack of cohesion among residents. This, in turn, impacts the more-than-human relationships and the extent to which they are relearned collectively. Cloughjordan appears to be a community by design, rather than by practice, where intellectual relearning prevails over embodied relearning. I concluded that the relearning of more-than-human entanglement cannot be seen as separate from the relearning to live a communal life.\",\"The full thesis is published on the [Cloughjordan Ecovillage website](https://www.thevillage.ie/education-group-visits/research-publications/).\"]},{\"id\":\"research-eden\",\"title\":\"EDEN\",\"categories\":[],\"section\":\"research\",\"cover\":\"/images/RESEARCH/EDEN.jpg\",\"images\":[{\"src\":\"/images/RESEARCH/EDEN.jpg\",\"alt\":\"EDEN\"},{\"src\":\"/images/RESEARCH/EDEN/Anarchy-01.png\",\"alt\":\"Anarchy-01\"},{\"src\":\"/images/RESEARCH/EDEN/DSC_0576-2.jpg\",\"alt\":\"DSC_0576-2\"},{\"src\":\"/images/RESEARCH/EDEN/DSC_0588-2.jpg\",\"alt\":\"DSC_0588-2\"},{\"src\":\"/images/RESEARCH/EDEN/Food table-01.png\",\"alt\":\"Food table-01\"},{\"src\":\"/images/RESEARCH/EDEN/Report images 2-02.png\",\"alt\":\"Report images 2-02\"},{\"src\":\"/images/RESEARCH/EDEN/Report images-02.png\",\"alt\":\"Report images-02\"},{\"src\":\"/images/RESEARCH/EDEN/Toolbox-02.jpg\",\"alt\":\"Toolbox-02\"}],\"standalone\":false,\"paragraphs\":[\"*Final Bachelor Project | BSc Industrial Design | Jan. 2022 – July 2022*\",\"The current wave of climate and social justice activism is dedicated to building more just spaces, while at the same time battling negative eco-emotions and the reproduction of oppressive structures. Having a clear understanding of your hope for the world and working towards this vision, provides support for those involved in justice work. Already expressing your ends through your means aids the building of prefigurative counterpowers as an alternative to the status quo. To support this process, I developed EDEN, a workshop and accompanying toolbox which helps communities to talk about their values and evaluate to what extent they embody them.\"]},{\"id\":\"research-muzus\",\"title\":\"MUZUS\",\"categories\":[],\"section\":\"research\",\"cover\":\"/images/RESEARCH/MUZUS.png\",\"images\":[{\"src\":\"/images/RESEARCH/MUZUS.png\",\"alt\":\"MUZUS\"},{\"src\":\"/images/RESEARCH/MUZUS/DSC_0015-2.jpg\",\"alt\":\"DSC_0015-2\"},{\"src\":\"/images/RESEARCH/MUZUS/Praatplaat Infectiepreventie in de gehandicaptenzorg final_Page_1.png\",\"alt\":\"Praatplaat Infectiepreventie in de gehandicaptenzorg final_Page_1\"},{\"src\":\"/images/RESEARCH/MUZUS/Scenario_Tekengebied 1.png\",\"alt\":\"Scenario_Tekengebied 1\"},{\"src\":\"/images/RESEARCH/MUZUS/Sensitizing.png\",\"alt\":\"Sensitizing\"},{\"src\":\"/images/RESEARCH/MUZUS/Wandelplaat Rijndam kleuren_Page_1.png\",\"alt\":\"Wandelplaat Rijndam kleuren_Page_1\"}],\"standalone\":false,\"paragraphs\":[\"*Internship | Muzus | Sep. 2021 – Jan. 2022*\",\"Muzus is a research and design agency active within the fields of social and service design. During my internship, I worked on the project #verBAASjezelf (#amazeyourself), which focused on how to ensure that the dreams, motivations, and talents with which young people want to shape their personal lives, is the starting point of rehabilitation. We developed a healthcare path centred around talent development in cooperation with experts from Rijndam Revalidatie.\"]},{\"id\":\"research-research-art-the-climate-crisis\",\"title\":\"Research Art \u0026 the Climate Crisis\",\"categories\":[],\"section\":\"research\",\"cover\":\"/images/RESEARCH/Research Art \u0026 the Climate Crisis.jpg\",\"images\":[{\"src\":\"/images/RESEARCH/Research Art \u0026 the Climate Crisis.jpg\",\"alt\":\"Research Art \u0026 the Climate Crisis\"}],\"standalone\":true,\"paragraphs\":[\"*Kunstloc Brabant | in collaboration with Charlotte Hopmans | Apr. 2022 – Nov. 2022*\",\"For Kunstloc Brabant, I researched the relationship between art and the climate crisis, using a combination of literature analysis and the interviewing of artists and activists. I looked into both how the arts and culture sector could contribute to a more sustainable and just world, as well as how Kunstloc and the culture sector itself could operate more sustainably. The results of the research were presented at a workshop to a diverse network of interested parties. You can find out more about the research [here](https://www.kunstlocbrabant.nl/kennis-inspiratie/op-verkenning-de-klimaatcrisis-39621).\"]},{\"id\":\"research-una\",\"title\":\"UNA\",\"categories\":[],\"section\":\"research\",\"cover\":\"/images/RESEARCH/UNA.png\",\"images\":[{\"src\":\"/images/RESEARCH/UNA.png\",\"alt\":\"UNA\"},{\"src\":\"/images/RESEARCH/UNA/process visualization 2.jpg\",\"alt\":\"process visualization 2\"},{\"src\":\"/images/RESEARCH/UNA/Prototype.JPG\",\"alt\":\"Prototype\"}],\"standalone\":false,\"paragraphs\":[\"*Design Research Project | BSc Industrial Design | Feb. 2020 – June 2020*\",\"UNA is a virtual tool and research project on the influence of designs extending a physical artefact on the feeling of connectivity between an applicant and a recruiter during a virtual job interview.\"]},{\"id\":\"research-kaliko\",\"title\":\"Kaliko\",\"categories\":[],\"section\":\"research\",\"cover\":\"/images/RESEARCH/Kaliko.png\",\"images\":[{\"src\":\"/images/RESEARCH/Kaliko.png\",\"alt\":\"Kaliko\"}],\"standalone\":true,\"paragraphs\":[\"*Design Project | BSc Industrial Design | Feb. 2019 – June 2019*\",\"Kaliko is an interactive set of personalised stuffed animals aimed at enhancing the bond between parent and child.\"]}],\"filters\":[\"All\"]},\"showFilters\":false}],null,\"$L6\"]}],{},null,false]},null,false]},null,false],\"$L7\",false]],\"m\":\"$undefined\",\"G\":[\"$8\",[]],\"s\":false,\"S\":true}\n"])</script><script>self.__next_f.push([1,"9:I[4431,[],\"OutletBoundary\"]\nb:I[5278,[],\"AsyncMetadataOutlet\"]\nd:I[4431,[],\"ViewportBoundary\"]\nf:I[4431,[],\"MetadataBoundary\"]\n10:\"$Sreact.suspense\"\n6:[\"$\",\"$L9\",null,{\"children\":[\"$La\",[\"$\",\"$Lb\",null,{\"promise\":\"$@c\"}]]}]\n7:[\"$\",\"$1\",\"h\",{\"children\":[null,[[\"$\",\"$Ld\",null,{\"children\":\"$Le\"}],[\"$\",\"meta\",null,{\"name\":\"next-size-adjust\",\"content\":\"\"}]],[\"$\",\"$Lf\",null,{\"children\":[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$10\",null,{\"fallback\":null,\"children\":\"$L11\"}]}]}]]}]\n"])</script><script>self.__next_f.push([1,"e:[[\"$\",\"meta\",\"0\",{\"charSet\":\"utf-8\"}],[\"$\",\"meta\",\"1\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}]]\na:null\n"])</script><script>self.__next_f.push([1,"c:{\"metadata\":[[\"$\",\"title\",\"0\",{\"children\":\"Elsa van Dam — Illustration\"}],[\"$\",\"meta\",\"1\",{\"name\":\"description\",\"content\":\"Portfolio of Elsa van Dam — illustration, research, and workshops.\"}]],\"error\":null,\"digest\":\"$undefined\"}\n"])</script><script>self.__next_f.push([1,"11:\"$c:metadata\"\n"])</script></body></html>
