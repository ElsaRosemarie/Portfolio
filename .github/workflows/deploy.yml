name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Read site config
        id: site
        run: |
          BASE_PATH=$(node -p "JSON.parse(require('fs').readFileSync('content/site.json','utf8')).basePath ?? ''")
          DOMAIN=$(node -p "JSON.parse(require('fs').readFileSync('content/site.json','utf8')).customDomain?.trim() || ''")
          echo "base_path=${BASE_PATH}" >> $GITHUB_OUTPUT
          echo "domain=${DOMAIN}" >> $GITHUB_OUTPUT

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.site.outputs.base_path }}

      - run: touch out/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          cname: ${{ steps.site.outputs.domain }}
